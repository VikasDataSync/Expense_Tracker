{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="add-expense-page">
    <div class="add-expense-inner">
        <header class="add-expense-header">
            <h1 class="add-expense-title">Add expense</h1>
            <p class="add-expense-subtitle">Record a new spending entry for your account.</p>
        </header>

        <article class="add-expense-card">
            {% if error %}
                <p class="auth-error">{{ error }}</p>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}" class="add-expense-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input
                        id="amount"
                        name="amount"
                        type="number"
                        min="0.01"
                        step="0.01"
                        class="form-input"
                        value="{{ form_data.amount }}"
                        placeholder="0.00"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="">Select category</option>
                        {% for category in categories %}
                            <option value="{{ category }}" {% if form_data.category == category %}selected{% endif %}>{{ category }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input
                        id="date"
                        name="date"
                        type="date"
                        class="form-input"
                        value="{{ form_data.date }}"
                        max="{{ today_iso }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="description">Description (optional)</label>
                    <textarea
                        id="description"
                        name="description"
                        class="form-input add-expense-textarea"
                        rows="4"
                        placeholder="What was this expense for?"
                    >{{ form_data.description }}</textarea>
                </div>

                <div class="add-expense-actions">
                    <a href="{{ url_for('dashboard') }}" class="btn-ghost">Cancel</a>
                    <button type="submit" class="btn-primary">Save expense</button>
                </div>
            </form>
        </article>
    </div>
</section>
{% endblock %}
